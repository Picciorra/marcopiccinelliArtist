<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marco Piccinelli — Galleria virtuale 3D</title>
<style>
  :root{--gold:#c69a2e;--cream:#efe9df;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0e0c0a;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--cream)}
  #app{position:fixed;inset:0}
  canvas{display:block;cursor:grab}
  canvas:active{cursor:grabbing}

  /* --- UI overlay --- */
  .ui{position:fixed;z-index:10;pointer-events:none;user-select:none}
  .title{top:26px;left:30px}
  .title h1{font-size:22px;font-weight:800;letter-spacing:.04em}
  .title p{font-size:13px;color:#b6ab97;margin-top:4px;letter-spacing:.06em}
  .hint{bottom:26px;left:50%;transform:translateX(-50%);text-align:center;
    font-size:13px;letter-spacing:.08em;color:#cdc2b0;
    background:rgba(20,16,12,.5);padding:10px 18px;border:1px solid rgba(255,255,255,.1);
    border-radius:40px;backdrop-filter:blur(6px);transition:opacity .6s}
  .hint b{color:var(--gold);font-weight:600}

  /* lightbox — visualizzazione opera a schermo intero (mobile-friendly) */
  .lightbox{position:fixed;inset:0;z-index:14;background:rgba(10,8,6,.94);backdrop-filter:blur(4px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
    padding:70px 90px 26px;opacity:0;pointer-events:none;transition:opacity .4s}
  .lightbox.show{opacity:1;pointer-events:auto}
  .lightbox .lbImgWrap{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center}
  .lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:2px;
    box-shadow:0 30px 70px rgba(0,0,0,.6)}
  .lightbox .lbClose{position:absolute;top:22px;right:26px;width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);display:flex;
    align-items:center;justify-content:center;cursor:pointer;transition:background .25s}
  .lightbox .lbClose:hover{background:rgba(198,154,46,.3)}
  .lightbox .lbClose svg{width:18px;height:18px;stroke:var(--cream);stroke-width:2.2}
  .lightbox .info{flex:0 0 auto;width:100%;max-width:640px;padding-top:20px;text-align:center}
  .lightbox .k{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold)}
  .lightbox h2{font-size:22px;font-weight:800;margin:8px 0 4px;letter-spacing:.01em;line-height:1.2}
  .lightbox .yr{font-size:13px;color:#b6ab97;margin-bottom:10px}
  .lightbox .meta{display:flex;justify-content:center;gap:22px;font-size:13px;color:#d8cdba;flex-wrap:wrap}
  .lightbox .meta span:first-child{color:#8f8474;margin-right:5px}
  .badge{display:inline-block;margin-top:14px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    padding:5px 12px;color:#fff;border-radius:2px}
  .badge.available{background:#3f7ea8}.badge.sold{background:#8a4a3f}
  @media (max-width:640px){
    .lightbox{padding:60px 54px 18px}
    .lightbox h2{font-size:19px}
  }

  .loader{position:fixed;inset:0;z-index:20;background:#0e0c0a;display:flex;align-items:center;
    justify-content:center;flex-direction:column;gap:16px;transition:opacity .8s}
  .loader.hide{opacity:0;pointer-events:none}
  .loader .ring{width:40px;height:40px;border:3px solid rgba(198,154,46,.25);border-top-color:var(--gold);
    border-radius:50%;animation:spin 1s linear infinite}
  .loader p{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#8f8474}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* navigation arrows — cambia opera senza doverci cliccare sopra */
  .navArrow{position:fixed;top:50%;transform:translateY(-50%);z-index:16;width:52px;height:52px;
    border-radius:50%;background:rgba(20,16,12,.5);border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
    cursor:pointer;pointer-events:auto;transition:background .25s,border-color .25s;user-select:none}
  .navArrow:hover{background:rgba(198,154,46,.25);border-color:var(--gold)}
  .navArrow svg{width:20px;height:20px;stroke:var(--cream);fill:none;stroke-width:2.4;
    stroke-linecap:round;stroke-linejoin:round}
  .navArrow.left{left:26px}
  .navArrow.right{right:26px}
  @media (max-width:640px){.navArrow{width:42px;height:42px}.navArrow.left{left:12px}.navArrow.right{right:12px}}
</style>
</head>
<body>
<div id="app"></div>

<div class="ui title"><h1>Marco Piccinelli</h1><p>GALLERIA VIRTUALE · ILLUSIONI ONIRICHE</p></div>
<div class="ui hint" id="hint"><b>Trascina</b> per guardarti intorno · <b>Clicca</b> un'opera · <b>‹ ›</b> per cambiare</div>

<div class="lightbox" id="caption">
  <div class="lbClose" id="cClose" aria-label="Chiudi"><svg viewBox="0 0 24 24"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg></div>
  <div class="lbImgWrap"><img id="cImg" alt=""></div>
  <div class="info">
    <div class="k">Opera</div>
    <h2 id="cTitle"></h2>
    <div class="yr" id="cYear"></div>
    <div class="meta">
      <span><span>Dimensioni</span><span id="cDims"></span></span>
      <span><span>Stato</span><span id="cStatusText"></span></span>
    </div>
    <span class="badge" id="cBadge"></span>
  </div>
</div>

<div class="navArrow left" id="navPrev" aria-label="Opera precedente"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
<div class="navArrow right" id="navNext" aria-label="Opera successiva"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>

<div class="loader" id="loader"><div class="ring"></div><p>Allestimento della galleria…</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   GALLERIA 3D — Marco Piccinelli
   Three.js r128. Le opere sono texture generate su canvas
   (stile "cloisonné"): per le foto vere basta sostituire
   makeArtCanvas() con un THREE.TextureLoader().load('opera.jpg').
========================================================= */
const THREEc = window.THREE;

/* ---- generatore texture opera (canvas 2D) ---- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const PALS=[
  {bg:'#2b2019',c:['#c69a2e','#8a6d1f','#6f8a86','#c3a79c','#b7c3c6','#3d5c6b','#d9c48a']},
  {bg:'#1f2a30',c:['#2f7fbf','#c69a2e','#c0392b','#6f8a86','#d9c48a','#28516b','#b7c3c6']},
  {bg:'#3a1f1c',c:['#c0392b','#c69a2e','#8a6d1f','#c3a79c','#6f8a86','#7a2b22','#e0cf9e']},
  {bg:'#26221a',c:['#c69a2e','#b7c3c6','#6f8a86','#8a6d1f','#c3a79c','#4a3f2a','#d9c48a']}
];
function makeArtCanvas(seed,pi,W=512,H=640){
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const x=cv.getContext('2d');const rnd=mulberry32(seed);const P=PALS[pi%PALS.length];
  x.fillStyle=P.bg;x.fillRect(0,0,W,H);
  const step=54;
  for(let gy=-10;gy<H+step;gy+=step){
    for(let gx=-10;gx<W+step;gx+=step){
      const cx=gx+(rnd()-.5)*step*.9, cy=gy+(rnd()-.5)*step*.9;
      const r=step*.36+rnd()*step*.44;
      const pts=6+((rnd()*3)|0);
      x.beginPath();
      for(let i=0;i<pts;i++){
        const a=(i/pts)*Math.PI*2, rr=r*(.72+rnd()*.5);
        const px=cx+Math.cos(a)*rr, py=cy+Math.sin(a)*rr*1.05;
        i?x.lineTo(px,py):x.moveTo(px,py);
      }
      x.closePath();
      x.fillStyle=P.c[(rnd()*P.c.length)|0];x.fill();
      x.lineWidth=3;x.strokeStyle='#141008';x.stroke();
    }
  }
  for(let k=0;k<2;k++){
    const y0=H*(.2+rnd()*.5), gold=k?'#8a6d1f':'#c69a2e';
    x.beginPath();x.moveTo(-20,y0);
    x.bezierCurveTo(W*.3,y0-90+rnd()*60,W*.6,y0+120-rnd()*60,W+20,y0-40);
    x.lineWidth=22+rnd()*18;x.strokeStyle=gold;x.lineCap='round';x.stroke();
  }
  return cv;
}

/* ---- dati opere di FALLBACK ----
   Usati solo se opere.json non è raggiungibile (es. aprendo il file
   con doppio clic da disco). Online il sito legge opere.json, gestito
   dal CMS. Non serve modificare questa lista: si edita opere.json. ---- */
const FALLBACK=[
  {t:'Ostrega e champagne',y:'2022',d:'90 × 72 cm',st:'available',seed:11,pi:0,wall:'back',u:0},
  {t:'Il tempo della lumaca',y:'2022',d:'90 × 72 cm',st:'available',seed:23,pi:1,wall:'left',u:-2.2},
  {t:'Ruota della fortuna',y:'2023',d:'70 × 50 cm',st:'sold',seed:37,pi:2,wall:'left',u:2.2},
  {t:'Battaglia silente',y:'2023',d:'90 × 72 cm',st:'available',seed:52,pi:3,wall:'right',u:-2.2},
  {t:'Mappa dell\'inconscio',y:'2024',d:'100 × 80 cm',st:'available',seed:78,pi:1,wall:'right',u:2.2}
];

/* ---- scene ---- */
const app=document.getElementById('app');
const scene=new THREEc.Scene();
scene.background=new THREEc.Color('#171310');
scene.fog=new THREEc.Fog('#171310',9,26);

const camera=new THREEc.PerspectiveCamera(62,innerWidth/innerHeight,.1,100);
const CAM=new THREEc.Vector3(0,1.65,4.2);
camera.position.copy(CAM);

const renderer=new THREEc.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREEc.PCFSoftShadowMap;
renderer.outputEncoding=THREEc.sRGBEncoding;
renderer.toneMapping=THREEc.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;
app.appendChild(renderer.domElement);

/* room */
const RW=12,RD=12,RH=5;
const wallMat=new THREEc.MeshStandardMaterial({color:'#e2dbcd',roughness:.94,metalness:0});
const floorMat=new THREEc.MeshStandardMaterial({color:'#c9c0b0',roughness:.65,metalness:.05});
const ceilMat=new THREEc.MeshStandardMaterial({color:'#d8d1c4',roughness:1});
const trimMat=new THREEc.MeshStandardMaterial({color:'#241f19',roughness:.6,metalness:.15});

function plane(w,h,mat){return new THREEc.Mesh(new THREEc.PlaneGeometry(w,h),mat);}
// parete con apertura rettangolare (finestra/nicchia) e spessore vero, per non sembrare un cartone piatto
function wallWithHole(width,height,holeW,holeH,holeU,holeY0,thickness){
  const shape=new THREEc.Shape();
  shape.moveTo(-width/2,0);shape.lineTo(width/2,0);shape.lineTo(width/2,height);shape.lineTo(-width/2,height);shape.lineTo(-width/2,0);
  const hole=new THREEc.Path();
  const x0=holeU-holeW/2,x1=holeU+holeW/2,y0=holeY0,y1=holeY0+holeH;
  hole.moveTo(x0,y0);hole.lineTo(x1,y0);hole.lineTo(x1,y1);hole.lineTo(x0,y1);hole.lineTo(x0,y0);
  shape.holes.push(hole);
  return new THREEc.ExtrudeGeometry(shape,{depth:thickness,bevelEnabled:false,curveSegments:1});
}
function trimBox(w,h,d,x,y,z,mat){
  const m=new THREEc.Mesh(new THREEc.BoxGeometry(w,h,d),mat||trimMat);
  m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);return m;
}

// floor
const floor=plane(RW,RD,floorMat);floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
// ceiling
const ceil=plane(RW,RD,ceilMat);ceil.rotation.x=Math.PI/2;ceil.position.y=RH;scene.add(ceil);
// back wall
const back=plane(RW,RH,wallMat);back.position.set(0,RH/2,-RD/2);back.receiveShadow=true;scene.add(back);
// front wall (behind camera)
const front=plane(RW,RH,wallMat);front.position.set(0,RH/2,RD/2);front.rotation.y=Math.PI;scene.add(front);

/* --- parete destra: finestra vera, con vetro, telaio e frangisole --- */
const wallT=.18;
const WIN={w:2.3,h:2.7,u:4.3,y0:.55};
const rightGeo=wallWithHole(RD,RH,WIN.w,WIN.h,WIN.u,WIN.y0,wallT);
const right=new THREEc.Mesh(rightGeo,wallMat);
right.position.set(RW/2,0,0);right.rotation.y=-Math.PI/2;
right.castShadow=true;right.receiveShadow=true;scene.add(right);

const glassMat=new THREEc.MeshStandardMaterial({color:'#bcd9e6',transparent:true,opacity:.25,roughness:.05,metalness:0,side:THREEc.DoubleSide});
const glass=new THREEc.Mesh(new THREEc.PlaneGeometry(WIN.w-.05,WIN.h-.05),glassMat);
glass.position.set(RW/2-wallT/2,WIN.y0+WIN.h/2,WIN.u);glass.rotation.y=-Math.PI/2;scene.add(glass);

const skyMat=new THREEc.MeshStandardMaterial({color:'#dfe9f2',emissive:'#cfe3f0',emissiveIntensity:.85,roughness:1});
const sky=new THREEc.Mesh(new THREEc.PlaneGeometry(7,7),skyMat);
sky.position.set(RW/2+2.4,WIN.y0+WIN.h/2,WIN.u);sky.rotation.y=-Math.PI/2;scene.add(sky);

// telaio della finestra
const wx=RW/2-wallT-.03;
trimBox(.06,.06,WIN.w+.12,wx,WIN.y0+WIN.h+.03,WIN.u);
trimBox(.06,.06,WIN.w+.12,wx,WIN.y0-.03,WIN.u);
trimBox(.06,WIN.h,.06,wx,WIN.y0+WIN.h/2,WIN.u-WIN.w/2-.03);
trimBox(.06,WIN.h,.06,wx,WIN.y0+WIN.h/2,WIN.u+WIN.w/2+.03);

// frangisole — doghe angolate davanti alla finestra: disegnano strisce di luce/ombra in sala
const louverMat=new THREEc.MeshStandardMaterial({color:'#332c22',roughness:.7,metalness:.1});
const louverCount=7;
for(let i=0;i<louverCount;i++){
  const ly=WIN.y0+.2+i*((WIN.h-.4)/(louverCount-1));
  const lv=new THREEc.Mesh(new THREEc.BoxGeometry(.05,.05,WIN.w+.14),louverMat);
  lv.position.set(RW/2+.34,ly,WIN.u);lv.rotation.x=.32;
  lv.castShadow=true;lv.receiveShadow=true;scene.add(lv);
}

// luce del sole che entra dalla finestra, filtrata dal frangisole
const sun=new THREEc.DirectionalLight('#ffedcf',1.05);
sun.position.set(RW/2+3,WIN.y0+WIN.h*.85,WIN.u+1.4);
sun.target.position.set(-1,1,WIN.u-1.5);
sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-9;sun.shadow.camera.right=9;sun.shadow.camera.top=9;sun.shadow.camera.bottom=-9;
sun.shadow.camera.near=.5;sun.shadow.camera.far=24;sun.shadow.bias=-.0015;
scene.add(sun);scene.add(sun.target);

/* --- parete sinistra: nicchia con piccola scultura e luce propria --- */
const left=plane(RD,RH,wallMat);left.position.set(-RW/2,RH/2,0);left.rotation.y=Math.PI/2;left.receiveShadow=true;scene.add(left);

const NICHE={w:1.0,h:1.5,u:4.6,y0:.9,depth:.34};
const nicheMat=new THREEc.MeshStandardMaterial({color:'#3a352c',roughness:.85});
const nicheBack=new THREEc.Mesh(new THREEc.PlaneGeometry(NICHE.w,NICHE.h),nicheMat);
nicheBack.position.set(-RW/2+.07+NICHE.depth,NICHE.y0+NICHE.h/2,NICHE.u);nicheBack.rotation.y=Math.PI/2;
nicheBack.receiveShadow=true;scene.add(nicheBack);
trimBox(NICHE.depth,.03,NICHE.w,-RW/2+.07+NICHE.depth/2,NICHE.y0+NICHE.h,NICHE.u,nicheMat);
trimBox(NICHE.depth,.03,NICHE.w,-RW/2+.07+NICHE.depth/2,NICHE.y0,NICHE.u,nicheMat);
trimBox(NICHE.depth,NICHE.h,.03,-RW/2+.07+NICHE.depth/2,NICHE.y0+NICHE.h/2,NICHE.u-NICHE.w/2,nicheMat);
trimBox(NICHE.depth,NICHE.h,.03,-RW/2+.07+NICHE.depth/2,NICHE.y0+NICHE.h/2,NICHE.u+NICHE.w/2,nicheMat);
// piccolo piedistallo + scultura nella nicchia
const plinthMat=new THREEc.MeshStandardMaterial({color:'#efeae1',roughness:.9});
const plinth=new THREEc.Mesh(new THREEc.BoxGeometry(.32,.28,.32),plinthMat);
plinth.position.set(-RW/2+.07+NICHE.depth*.55,NICHE.y0+.14,NICHE.u);
plinth.castShadow=true;plinth.receiveShadow=true;scene.add(plinth);
const sculptMat=new THREEc.MeshStandardMaterial({color:'#c9c0b0',roughness:.4,metalness:.15});
const sculpt=new THREEc.Mesh(new THREEc.SphereGeometry(.2,24,24),sculptMat);
sculpt.position.set(-RW/2+.07+NICHE.depth*.55,NICHE.y0+.28+.2,NICHE.u);
sculpt.castShadow=true;sculpt.receiveShadow=true;scene.add(sculpt);
const nicheLight=new THREEc.SpotLight('#fff2da',9,2.6,Math.PI/4.5,.5,1.4);
nicheLight.position.set(-RW/2+.07+NICHE.depth*.4,NICHE.y0+NICHE.h-.03,NICHE.u);
nicheLight.target=sculpt;nicheLight.castShadow=true;
scene.add(nicheLight);scene.add(nicheLight.target);

/* --- arco decorativo davanti alla parete di fondo --- */
const archMat=new THREEc.MeshStandardMaterial({color:'#d8d0c0',roughness:.85});
const archInnerW=3.2,archPillarH=2.6,pillarR=.15,archZ=-RD/2+1.1;
[-1,1].forEach(side=>{
  const pillar=new THREEc.Mesh(new THREEc.CylinderGeometry(pillarR,pillarR*1.15,archPillarH,20),archMat);
  pillar.position.set(side*archInnerW/2,archPillarH/2,archZ);
  pillar.castShadow=true;pillar.receiveShadow=true;scene.add(pillar);
});
const archCurve=new THREEc.Mesh(new THREEc.TorusGeometry(archInnerW/2,pillarR,12,24,Math.PI),archMat);
archCurve.position.set(0,archPillarH,archZ);
archCurve.castShadow=true;archCurve.receiveShadow=true;
scene.add(archCurve);

/* lighting */
scene.add(new THREEc.HemisphereLight('#fff6e8','#332c22',.4));
const amb=new THREEc.AmbientLight('#ffffff',.12);scene.add(amb);

// plafoniere a soffitto — punti luce veri e visibili, non solo faretti fantasma
function ceilingLight(x,z){
  const housing=new THREEc.Mesh(new THREEc.CylinderGeometry(.15,.17,.07,20),
    new THREEc.MeshStandardMaterial({color:'#141210',roughness:.4,metalness:.6}));
  housing.position.set(x,RH-.035,z);housing.castShadow=true;scene.add(housing);
  const bulb=new THREEc.Mesh(new THREEc.CircleGeometry(.115,20),
    new THREEc.MeshStandardMaterial({color:'#fff3d6',emissive:'#ffedbc',emissiveIntensity:1.8,roughness:.4}));
  bulb.rotation.x=Math.PI/2;bulb.position.set(x,RH-.071,z);scene.add(bulb);
  const pl=new THREEc.PointLight('#ffdfa8',2.6,6.5,2.2);
  pl.position.set(x,RH-.3,z);scene.add(pl);
}
[[-3.2,-3],[3.2,-3],[-3.2,1],[3.2,1],[0,-4.5]].forEach(([x,z])=>ceilingLight(x,z));

/* artworks */
const clickable=[];
const texLoader=new THREEc.TextureLoader();texLoader.crossOrigin='anonymous';
function addArtwork(a){
  const aw=2, ah=2.5, maxW=aw*.9, maxH=ah*.9;
  const grp=new THREEc.Group();
  // frame (black box)
  const frame=new THREEc.Mesh(new THREEc.BoxGeometry(aw+.22,ah+.22,.09),
    new THREEc.MeshStandardMaterial({color:'#111',roughness:.5,metalness:.2}));
  frame.castShadow=true;grp.add(frame);
  // matte
  const matte=new THREEc.Mesh(new THREEc.PlaneGeometry(aw+.02,ah+.02),
    new THREEc.MeshStandardMaterial({color:'#f4efe6',roughness:1}));
  matte.position.z=.05;grp.add(matte);
  // artwork surface — real photo if provided, else generated texture
  const artMat=new THREEc.MeshStandardMaterial({color:'#ffffff',roughness:.85});
  const art=new THREEc.Mesh(new THREEc.PlaneGeometry(maxW,maxH),artMat);
  art.position.z=.055;grp.add(art);
  art.userData=a;clickable.push(art);
  if(a.image){
    texLoader.load(a.image,tex=>{
      tex.encoding=THREEc.sRGBEncoding;artMat.map=tex;artMat.needsUpdate=true;
      const img=tex.image, ir=img.width/img.height;         // fit foto reale nella cornice
      let w=maxW,h=w/ir; if(h>maxH){h=maxH;w=h*ir;}
      art.scale.set(w/maxW,h/maxH,1);
      matte.scale.set((w+.04)/(aw+.02),(h+.04)/(ah+.02),1);
    },undefined,()=>{                                        // se l'immagine non carica, fallback texture
      const t=new THREEc.CanvasTexture(makeArtCanvas(a.seed||11,a.pi||0));
      t.encoding=THREEc.sRGBEncoding;artMat.map=t;artMat.needsUpdate=true;
    });
  }else{
    const t=new THREEc.CanvasTexture(makeArtCanvas(a.seed||11,a.pi||0));
    t.encoding=THREEc.sRGBEncoding;artMat.map=t;artMat.needsUpdate=true;
  }

  const y=1.75;
  if(a.wall==='back'){grp.position.set(a.u,y,-RD/2+.06);}
  if(a.wall==='left'){grp.position.set(-RW/2+.06,y,a.u);grp.rotation.y=Math.PI/2;}
  if(a.wall==='right'){grp.position.set(RW/2-.06,y,a.u);grp.rotation.y=-Math.PI/2;}
  scene.add(grp);

  // spotlight on the piece
  const sp=new THREEc.SpotLight('#fff3df',10,9,Math.PI/7,.5,1.4);
  const n=new THREEc.Vector3();grp.getWorldDirection(n); // frame faces +z of group
  sp.position.set(grp.position.x+n.x*2.2,4.3,grp.position.z+n.z*2.2);
  sp.target=grp;sp.castShadow=true;sp.shadow.mapSize.set(1024,1024);
  sp.shadow.camera.near=.5;sp.shadow.camera.far=12;
  scene.add(sp);scene.add(sp.target);
}
/* carica le opere dal CMS (opere.json); fallback ai dati inline */
(async function loadOpere(){
  let list=FALLBACK;
  try{
    const r=await fetch('opere.json',{cache:'no-store'});
    if(r.ok){const j=await r.json(); if(j&&Array.isArray(j.opere)&&j.opere.length) list=j.opere;}
  }catch(e){/* file:// o offline → uso il fallback */}
  list.forEach(addArtwork);
})();

/* =========================================================
   INTERAZIONE — look con drag solo orizzontale (yaw) + focus al clic
   Nessuna inclinazione verticale: la vista resta sempre dritta.
========================================================= */
let yaw=0,tYaw=0;
let dragging=false,lastX=0,lastY=0,moved=0;
const dir=new THREEc.Vector3();
function applyLook(){
  dir.set(Math.sin(yaw),0,-Math.cos(yaw));
  camera.lookAt(camera.position.x+dir.x,camera.position.y+dir.y,camera.position.z+dir.z);
}
const cvEl=renderer.domElement;
cvEl.addEventListener('pointerdown',e=>{dragging=true;moved=0;lastX=e.clientX;lastY=e.clientY;cvEl.setPointerCapture(e.pointerId);});
cvEl.addEventListener('pointermove',e=>{
  if(!dragging)return;
  const dx=e.clientX-lastX;lastX=e.clientX;lastY=e.clientY;moved+=Math.abs(dx);
  tYaw-=dx*.004;
  hideHint();
});
cvEl.addEventListener('pointerup',e=>{
  dragging=false;
  if(moved<6) onClick(e); // treat as click if not dragged
});

/* raycast click → focus artwork */
const ray=new THREEc.Raycaster();const ndc=new THREEc.Vector2();
const capEl=document.getElementById('caption');
function onClick(e){
  ndc.x=(e.clientX/innerWidth)*2-1;ndc.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(ndc,camera);
  const hit=ray.intersectObjects(clickable,false)[0];
  if(hit){currentIndex=clickable.indexOf(hit.object);focusArt(hit.object);}else{closeCaption();}
}

/* frecce ‹ › (e tasti freccia) — passa all'opera successiva/precedente senza cliccarci sopra */
let currentIndex=-1;
function focusIndex(i){
  if(!clickable.length)return;
  currentIndex=((i%clickable.length)+clickable.length)%clickable.length;
  focusArt(clickable[currentIndex]);
}
document.getElementById('navPrev').addEventListener('click',()=>focusIndex(currentIndex-1));
document.getElementById('navNext').addEventListener('click',()=>focusIndex(currentIndex+1));
addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){focusIndex(currentIndex-1);hideHint();}
  if(e.key==='ArrowRight'){focusIndex(currentIndex+1);hideHint();}
});

/* parallasse camera — l'inquadratura segue leggermente la posizione orizzontale del mouse */
let hoverX=0;
addEventListener('pointermove',e=>{
  hoverX=(e.clientX/innerWidth)*2-1;
});
function focusArt(mesh){
  const a=mesh.userData;
  // ruota la vista verso l'opera cliccata (solo asse orizzontale)
  const wp=new THREEc.Vector3();mesh.getWorldPosition(wp);
  const v=wp.clone().sub(camera.position).normalize();
  tYaw=Math.atan2(v.x,-v.z);
  // fill caption
  document.getElementById('cTitle').textContent=a.t;
  document.getElementById('cYear').textContent=a.y;
  document.getElementById('cDims').textContent=a.d;
  const stTxt=a.st==='available'?'Disponibile':'Venduta';
  document.getElementById('cStatusText').textContent=stTxt;
  const b=document.getElementById('cBadge');b.textContent=stTxt;b.className='badge '+a.st;
  // immagine: foto reale se caricata, altrimenti texture segnaposto generata in alta risoluzione
  const img=document.getElementById('cImg');
  img.src=a.image||makeArtCanvas(a.seed||11,a.pi||0,1024,1280).toDataURL();
  capEl.classList.add('show');hideHint();
}
function closeCaption(){capEl.classList.remove('show');}
document.getElementById('cClose').addEventListener('click',closeCaption);
addEventListener('keydown',e=>{if(e.key==='Escape')closeCaption();});

let hintHidden=false;
function hideHint(){if(hintHidden)return;hintHidden=true;const h=document.getElementById('hint');h.style.opacity=0;}

/* resize */
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* idle sway before first interaction */
let t0=performance.now();
function animate(){
  requestAnimationFrame(animate);
  if(!hintHidden){const e=(performance.now()-t0)/1000;tYaw=Math.sin(e*.25)*.18;}
  // il parallasse hover si somma al target ma si disattiva durante il drag manuale
  const hYaw=dragging?0:hoverX*.12;
  const gYaw=tYaw+hYaw;
  yaw+=(gYaw-yaw)*.06;
  applyLook();
  renderer.render(scene,camera);
}
animate();

/* hide loader once first frame is ready */
requestAnimationFrame(()=>{setTimeout(()=>document.getElementById('loader').classList.add('hide'),350);});
</script>

        window.netlifyIdentity.on("login", function () {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
